<!-- Scenario editor. A thin sibling of index.html: it loads the SAME engine
     (page-shell markup + full js/ stack) so restartGame / loadScenario /
     gameLoop / the sim / gamePaused all work unmodified, then js/editor.js
     hides the game HUD, swaps canvas input for click-to-place, and boots into
     a blank scenario world instead of the menu. __editorMode (set below,
     before any script) gates the additive guards in init.js and input.js. -->
<script>window.UI_VARIANT='mobile'; window.__editorMode=true;</script>
